<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简记账</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f7fa;
            min-height: 100vh;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        header h1 {
            font-size: 28px;
            color: #1a1a2e;
            font-weight: 600;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 20px;
            color: white;
        }
        
        .stat-card:last-child {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }
        
        .form-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group:last-child {
            margin-bottom: 0;
        }
        
        label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input[type="number"],
        select,
        input[type="date"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s;
            outline: none;
        }
        
        input[type="number"]:focus,
        select:focus,
        input[type="date"]:focus {
            border-color: #667eea;
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        .list-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }
        
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .list-header h2 {
            font-size: 18px;
            color: #1a1a2e;
        }
        
        .list-count {
            font-size: 14px;
            color: #999;
        }
        
        .expense-list {
            list-style: none;
        }
        
        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .expense-item:last-child {
            border-bottom: none;
        }
        
        .expense-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .category-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .category-food { background: #fff0f0; }
        .category-transport { background: #f0f8ff; }
        .category-shopping { background: #fff8f0; }
        .category-entertainment { background: #f0fff0; }
        .category-other { background: #fafafa; }
        
        .expense-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .expense-category {
            font-size: 16px;
            font-weight: 500;
            color: #1a1a2e;
        }
        
        .expense-date {
            font-size: 13px;
            color: #999;
        }
        
        .expense-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .expense-amount {
            font-size: 18px;
            font-weight: 600;
            color: #e74c3c;
        }
        
        .delete-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            transition: all 0.2s;
        }
        
        .delete-btn:hover {
            background: #ffebee;
            color: #e74c3c;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-state p {
            font-size: 15px;
            margin-top: 8px;
        }
        
        .category-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>极简记账</h1>
        </header>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">今日支出</div>
                <div class="stat-value" id="todayTotal">¥0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">本月支出</div>
                <div class="stat-value" id="monthTotal">¥0.00</div>
            </div>
        </div>
        
        <div class="form-section">
            <div class="form-group">
                <label for="amount">金额</label>
                <input type="number" id="amount" placeholder="0.00" step="0.01" min="0">
            </div>
            
            <div class="form-group">
                <label for="category">分类</label>
                <select id="category" class="category-select">
                    <option value="餐饮">餐饮</option>
                    <option value="交通">交通</option>
                    <option value="购物">购物</option>
                    <option value="娱乐">娱乐</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="date">日期</label>
                <input type="date" id="date">
            </div>
            
            <button onclick="addExpense()">保存</button>
        </div>
        
        <div class="list-section">
            <div class="list-header">
                <h2>支出记录</h2>
                <span class="list-count" id="recordCount">0 笔</span>
            </div>
            <ul class="expense-list" id="expenseList"></ul>
        </div>
    </div>
    
    <script>
        const categories = {
            '餐饮': { icon: '🍜', class: 'category-food' },
            '交通': { icon: '🚗', class: 'category-transport' },
            '购物': { icon: '🛍️', class: 'category-shopping' },
            '娱乐': { icon: '🎮', class: 'category-entertainment' },
            '其他': { icon: '📝', class: 'category-other' }
        };
        
        async function getExpenses() {
            try {
                const response = await fetch('/api/expenses');
                return await response.json();
            } catch (error) {
                console.error('获取数据失败:', error);
                return [];
            }
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return `${month}月${day}日 ${weekDays[date.getDay()]}`;
        }
        
        function isToday(dateStr) {
            const today = new Date();
            const date = new Date(dateStr);
            return today.toDateString() === date.toDateString();
        }
        
        function isThisMonth(dateStr) {
            const today = new Date();
            const date = new Date(dateStr);
            return today.getFullYear() === date.getFullYear() && 
                   today.getMonth() === date.getMonth();
        }
        
        async function calculateStats() {
            const expenses = await getExpenses();
            let todayTotal = 0;
            let monthTotal = 0;
            
            expenses.forEach(item => {
                const amount = parseFloat(item.amount);
                if (isToday(item.date)) {
                    todayTotal += amount;
                }
                if (isThisMonth(item.date)) {
                    monthTotal += amount;
                }
            });
            
            document.getElementById('todayTotal').textContent = `¥${todayTotal.toFixed(2)}`;
            document.getElementById('monthTotal').textContent = `¥${monthTotal.toFixed(2)}`;
            document.getElementById('recordCount').textContent = `${expenses.length} 笔`;
        }
        
        async function renderList() {
            const expenses = await getExpenses();
            const list = document.getElementById('expenseList');
            
            if (expenses.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 16px;">📝</div>
                        <p>还没有支出记录，快来添加吧~</p>
                    </div>
                `;
                return;
            }
            
            expenses.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            list.innerHTML = expenses.map(item => {
                const cat = categories[item.category] || categories['其他'];
                return `
                    <li class="expense-item" data-id="${item.id}">
                        <div class="expense-left">
                            <div class="category-icon ${cat.class}">${cat.icon}</div>
                            <div class="expense-info">
                                <div class="expense-category">${item.category}</div>
                                <div class="expense-date">${formatDate(item.date)}</div>
                            </div>
                        </div>
                        <div class="expense-right">
                            <div class="expense-amount">-¥${parseFloat(item.amount).toFixed(2)}</div>
                            <button class="delete-btn" onclick="deleteExpense('${item.id}')">×</button>
                        </div>
                    </li>
                `;
            }).join('');
        }
        
        async function addExpense() {
            const amount = document.getElementById('amount').value;
            const category = document.getElementById('category').value;
            const date = document.getElementById('date').value;
            
            if (!amount || parseFloat(amount) <= 0) {
                alert('请输入有效的金额');
                return;
            }
            
            if (!date) {
                alert('请选择日期');
                return;
            }
            
            try {
                await fetch('/api/expenses', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ amount, category, date })
                });
                
                document.getElementById('amount').value = '';
                document.getElementById('date').value = '';
                
                await calculateStats();
                await renderList();
            } catch (error) {
                alert('保存失败，请重试');
                console.error('保存失败:', error);
            }
        }
        
        async function deleteExpense(id) {
            if (!confirm('确定要删除这条记录吗？')) {
                return;
            }
            
            try {
                await fetch(`/api/expenses/${id}`, {
                    method: 'DELETE'
                });
                
                await calculateStats();
                await renderList();
            } catch (error) {
                alert('删除失败，请重试');
                console.error('删除失败:', error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
            
            await calculateStats();
            await renderList();
        });
    </script>
</body>
</html>
