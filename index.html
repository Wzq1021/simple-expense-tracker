<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>极简记账</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --primary: #5b7fff;
            --primary-light: #e8ecff;
            --primary-dark: #4a6ae8;
            --success: #07c160;
            --danger: #ee0a24;
            --warning: #ff976a;
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #8e8e93;
            --text-tertiary: #c0c0c5;
            --border: #f0f0f5;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            min-height: 100vh;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0;
        }
        
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
        
        .view {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .view.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
            box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.05);
            z-index: 1000;
            max-width: 480px;
            margin: 0 auto;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 6px 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            flex: 1;
            position: relative;
        }
        
        .nav-item.active {
            color: var(--primary);
        }
        
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 20px;
            height: 3px;
            background: var(--primary);
            border-radius: 2px;
        }
        
        .nav-item-icon {
            font-size: 24px;
        }
        
        .nav-item-text {
            font-size: 10px;
            font-weight: 500;
        }
        
        .nav-item-center {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .fab-main {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            box-shadow: 0 6px 20px rgba(91, 127, 255, 0.45);
            cursor: pointer;
            transition: all 0.25s;
            margin-top: -36px;
            border: 5px solid var(--bg);
        }
        
        .fab-main:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(91, 127, 255, 0.55);
        }
        
        .fab-main:active {
            transform: scale(0.95);
        }
        
        .bottom-sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 1500;
            backdrop-filter: blur(4px);
        }
        
        .bottom-sheet-overlay.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }
        
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            border-radius: 28px 28px 0 0;
            padding: 24px 24px calc(24px + env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1600;
            max-height: 90vh;
            overflow-y: auto;
            max-width: 480px;
            margin: 0 auto;
        }
        
        .bottom-sheet.show {
            transform: translateY(0);
        }
        
        .sheet-header {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .sheet-indicator {
            width: 48px;
            height: 5px;
            background: #dcdce6;
            border-radius: 3px;
        }
        
        .sheet-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: #f5f6fa;
            padding: 4px;
            border-radius: 16px;
        }
        
        .sheet-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .sheet-tab.active {
            background: var(--card);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        
        .amount-section {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .amount-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .amount-input-wrap {
            display: inline-flex;
            align-items: baseline;
            gap: 4px;
        }
        
        .amount-symbol {
            font-size: 32px;
            font-weight: 300;
            color: var(--text);
        }
        
        .amount-input {
            font-size: 48px;
            font-weight: 700;
            color: var(--text);
            border: none;
            outline: none;
            background: transparent;
            width: 200px;
            text-align: left;
            font-family: inherit;
        }
        
        .category-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 8px 4px;
            border-radius: 12px;
        }
        
        .category-item:hover {
            background: rgba(91, 127, 255, 0.05);
        }
        
        .category-item.active {
            background: var(--primary-light);
        }
        
        .category-item-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: #f5f6fa;
            transition: all 0.2s;
        }
        
        .category-item.active .category-item-icon {
            transform: scale(1.1);
        }
        
        .category-item-name {
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        .category-item.active .category-item-name {
            color: var(--primary);
            font-weight: 500;
        }
        
        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .form-group {
            flex: 1;
        }
        
        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
            background: #fafafa;
            color: var(--text);
        }
        
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
            background: var(--card);
            box-shadow: 0 0 0 3px rgba(91, 127, 255, 0.1);
        }
        
        .form-group.full-width {
            flex: none;
            width: 100%;
        }
        
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(91, 127, 255, 0.3);
            margin-top: 8px;
        }
        
        .btn-primary:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(91, 127, 255, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .transfer-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            color: var(--text-tertiary);
            font-size: 20px;
        }
        
        .header-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 32px 24px 40px;
            border-radius: 0 0 32px 32px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .header-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
        
        .header-card::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }
        
        .header-title {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 20px;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }
        
        .header-balance {
            font-size: 44px;
            font-weight: 700;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
            letter-spacing: -1px;
        }
        
        .header-stats {
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }
        
        .header-stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .header-stat-label {
            font-size: 13px;
            opacity: 0.85;
        }
        
        .header-stat-value {
            font-size: 20px;
            font-weight: 600;
        }
        
        .header-stat-value.income {
            color: #a8f0d5;
        }
        
        .header-stat-value.expense {
            color: #ffcdd9;
        }
        
        .section {
            padding: 0 24px;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .record-list {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        
        .date-group {
            padding: 16px 20px 8px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .date-divider {
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        
        .record-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        
        .record-item:last-child {
            border-bottom: none;
        }
        
        .record-item:active {
            background: #fafafa;
        }
        
        .record-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .record-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        
        .record-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .record-category {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
        }
        
        .record-detail {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .record-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .record-amount {
            font-size: 17px;
            font-weight: 600;
        }
        
        .record-amount.income { color: var(--success); }
        .record-amount.expense { color: var(--danger); }
        .record-amount.transfer { color: var(--primary); }
        
        .record-delete {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.2s;
        }
        
        .record-item:hover .record-delete {
            opacity: 1;
        }
        
        .record-delete:hover {
            background: #fee2e2;
            color: var(--danger);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
        }
        
        .empty-icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .empty-text {
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .empty-hint {
            font-size: 12px;
            color: var(--text-tertiary);
        }
        
        .stats-header {
            padding: 24px;
            background: var(--card);
            margin-bottom: 16px;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
        }
        
        .month-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .month-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: #f5f6fa;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .month-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
        }
        
        .current-month {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }
        
        .stats-summary {
            display: flex;
            gap: 16px;
        }
        
        .stats-card {
            flex: 1;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }
        
        .stats-card.income {
            background: linear-gradient(135deg, #e8f8f0 0%, #d4f5e8 100%);
        }
        
        .stats-card.expense {
            background: linear-gradient(135deg, #fff0f0 0%, #ffe4e4 100%);
        }
        
        .stats-card-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        
        .stats-card-value {
            font-size: 22px;
            font-weight: 700;
        }
        
        .stats-card-value.income { color: var(--success); }
        .stats-card-value.expense { color: var(--danger); }
        
        .chart-section {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
        }
        
        .trend-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 140px;
            margin-top: 16px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        
        .trend-bar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            gap: 6px;
        }
        
        .trend-bar-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            height: 100%;
            align-items: flex-end;
        }
        
        .trend-bar {
            width: 20px;
            border-radius: 10px;
            background: linear-gradient(to top, var(--primary), var(--primary-light));
            transition: height 0.5s ease;
            min-height: 4px;
            position: relative;
        }
        
        .trend-bar::after {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .trend-bar-container:hover .trend-bar::after {
            opacity: 1;
        }
        
        .trend-bar-label {
            font-size: 10px;
            color: var(--text-secondary);
        }
        
        .pie-chart-section {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
        }
        
        .pie-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 16px;
        }
        
        .pie-chart {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }
        
        .pie-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--card);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .pie-center-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
        }
        
        .pie-center-label {
            font-size: 10px;
            color: var(--text-secondary);
        }
        
        .pie-legend {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .pie-legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .pie-legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .pie-legend-name {
            font-size: 13px;
            color: var(--text);
            flex: 1;
        }
        
        .pie-legend-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }
        
        .accounts-header {
            padding: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 0 0 32px 32px;
            margin-bottom: 20px;
        }
        
        .accounts-title {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .accounts-total {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        
        .accounts-tabs {
            display: flex;
            gap: 8px;
        }
        
        .accounts-tab {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .accounts-tab.active {
            background: white;
            color: var(--primary);
        }
        
        .account-card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .account-card:active {
            transform: scale(0.98);
            box-shadow: var(--shadow-md);
        }
        
        .account-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .account-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .account-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .account-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }
        
        .account-balance {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
        }
        
        .account-footer {
            display: flex;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .add-account-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 20px;
            background: var(--card);
            border-radius: 20px;
            border: 2px dashed var(--border);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }
        
        .add-account-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }
        
        .settings-page {
            padding-top: 24px;
        }
        
        .settings-section {
            background: var(--card);
            border-radius: 20px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        
        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;

            background-position: right 0.75rem center;

    </style>
</head>
<body>

    <script>
        const categories = {
            '餐饮': { icon: '🍜', color: '#ff6b6b', bg: '#fff0f0' },
            '交通': { icon: '🚗', color: '#4ecdc4', bg: '#f0fdfb' },
            '购物': { icon: '🛍️', color: '#ff9f43', bg: '#fff8f0' },
            '娱乐': { icon: '🎮', color: '#a55eea', bg: '#f5f0ff' },
            '居住': { icon: '🏠', color: '#54a0ff', bg: '#f0f8ff' },
            '医疗': { icon: '💊', color: '#00d2d3', bg: '#e8f8f8' },
            '教育': { icon: '📚', color: '#ff9ff3', bg: '#fff0ff' },
            '其他': { icon: '📝', color: '#8e8e93', bg: '#f5f5f5' },
            '工资': { icon: '💼', color: '#07c160', bg: '#e8f8f0' },
            '奖金': { icon: '🎁', color: '#5b7fff', bg: '#e8ecff' },
            '投资': { icon: '📈', color: '#ffc107', bg: '#fffde7' },
            '转账': { icon: '🔄', color: '#8b5cf6', bg: '#f3e8ff' }
        };
        
        const expenseCategories = ['餐饮', '交通', '购物', '娱乐', '居住', '医疗', '教育', '其他'];
        const incomeCategories = ['工资', '奖金', '投资', '其他'];
        
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let currentTab = 'expense';
        let currentView = 'home';
        let selectedCategory = '';
        let accounts = [];
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return `${month}月${day}日 ${weekDays[date.getDay()]}`;
        }
        
        function formatDateGroup(dateStr) {
            const date = new Date(dateStr);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (date.toDateString() === today.toDateString()) {
                return '今天';
            } else if (date.toDateString() === yesterday.toDateString()) {
                return '昨天';
            }
            
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return `${month}月${day}日 ${weekDays[date.getDay()]}`;
        }
        
        function getMonthRange(year, month) {
            const startDate = `${year}-${String(month + 1).padStart(2, '0')}-01`;
            const endDate = new Date(year, month + 1, 0);
            const endDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(endDate.getDate()).padStart(2, '0')}`;
            return { startDate, endDateStr };
        }
        
        function updateMonthDisplay() {
            document.getElementById('statsMonth').textContent = `${currentYear}年${currentMonth + 1}月`;
        }
        
        function prevMonth() {
            if (currentMonth === 0) {
                currentMonth = 11;
                currentYear--;
            } else {
                currentMonth--;
            }
            updateMonthDisplay();
            refreshData();
        }
        
        function nextMonth() {
            const today = new Date();
            if (currentYear === today.getFullYear() && currentMonth === today.getMonth()) {
                return;
            }
            if (currentMonth === 11) {
                currentMonth = 0;
                currentYear++;
            } else {
                currentMonth++;
            }
            updateMonthDisplay();
            refreshData();
        }
        
        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const navItem = document.querySelector(`.nav-item[onclick="switchView('${view}')"]`);
            if (navItem) navItem.classList.add('active');
            
            refreshData();
        }
        
        function switchAccountsTab(tab) {
            document.querySelectorAll('.accounts-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.accounts-tab[onclick="switchAccountsTab('${tab}')"]`).classList.add('active');
            renderAccountList();
        }
        
        function renderCategoryGrid() {
            const grid = document.getElementById('categoryGrid');
            const cats = currentTab === 'income' ? incomeCategories : expenseCategories;
            
            grid.innerHTML = cats.map(cat => {
                const info = categories[cat];
                const isActive = selectedCategory === cat;
                return `
                    <div class="category-item ${isActive ? 'active' : ''}" onclick="selectCategory('${cat}')">
                        <div class="category-item-icon" style="background: ${isActive ? info.bg : '#f5f6fa'};">${info.icon}</div>
                        <div class="category-item-name">${cat}</div>
                    </div>
                `;
            }).join('');
        }
        
        function selectCategory(cat) {
            selectedCategory = cat;
            renderCategoryGrid();
        }
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.sheet-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.sheet-tab[onclick="switchTab('${tab}')"]`).classList.add('active');
            
            selectedCategory = '';
            renderCategoryGrid();
            
            const accountRow = document.getElementById('accountRow');
            const toAccountGroup = document.getElementById('toAccountGroup');
            
            if (tab === 'transfer') {
                accountRow.style.display = 'flex';
                toAccountGroup.style.display = 'block';
            } else {
                accountRow.style.display = 'flex';
                toAccountGroup.style.display = 'none';
            }
        }
        
        function openBottomSheet() {
            document.getElementById('sheetOverlay').classList.add('show');
            document.getElementById('bottomSheet').classList.add('show');
            selectedCategory = '';
            renderCategoryGrid();
        }
        
        function closeBottomSheet() {
            document.getElementById('sheetOverlay').classList.remove('show');
            document.getElementById('bottomSheet').classList.remove('show');
        }
        
        async function loadAccounts() {
            try {
                const response = await fetch('/api/accounts');
                accounts = await response.json();
                
                const options = accounts.map(acc => 
                    `<option value="${acc.id}">${acc.icon} ${acc.name}</option>`
                ).join('');
                
                document.getElementById('account').innerHTML = options;
                document.getElementById('toAccount').innerHTML = options;
            } catch (error) {
                console.error('获取账户失败:', error);
            }
        }
        
        async function getExpenses(type) {
            const { startDate, endDateStr } = getMonthRange(currentYear, currentMonth);
            try {
                const url = type 
                    ? `/api/expenses?start=${startDate}&end=${endDateStr}&type=${type}`
                    : `/api/expenses?start=${startDate}&end=${endDateStr}`;
                const response = await fetch(url);
                const data = await response.json();
                return data.error ? [] : data;
            } catch (error) {
                return [];
            }
        }
        
        async function getAllExpenses() {
            try {
                const response = await fetch('/api/expenses');
                const data = await response.json();
                return data.error ? [] : data;
            } catch (error) {
                return [];
            }
        }
        
        async function getStats() {
            const { startDate, endDateStr } = getMonthRange(currentYear, currentMonth);
            try {
                const response = await fetch(`/api/stats?start=${startDate}&end=${endDateStr}`);
                const data = await response.json();
                return data.error ? { income: 0, expense: 0 } : data;
            } catch (error) {
                return { income: 0, expense: 0 };
            }
        }
        
        async function getCategoryStats() {
            const { startDate, endDateStr } = getMonthRange(currentYear, currentMonth);
            try {
                const response = await fetch(`/api/stats/categories?start=${startDate}&end=${endDateStr}`);
                const data = await response.json();
                return data.error ? [] : data;
            } catch (error) {
                return [];
            }
        }
        
        async function getDailyStats() {
            const { startDate, endDateStr } = getMonthRange(currentYear, currentMonth);
            try {
                const response = await fetch(`/api/stats/daily?start=${startDate}&end=${endDateStr}`);
                const data = await response.json();
                return data.error ? [] : data;
            } catch (error) {
                return [];
            }
        }
        
        async function getAccountBalances() {
            try {
                const response = await fetch('/api/account-balances');
                const data = await response.json();
                return data.error ? { accounts: [], totalBalance: 0 } : data;
            } catch (error) {
                return { accounts: [], totalBalance: 0 };
            }
        }
        
        async function calculateStats() {
            const stats = await getStats();
            
            document.getElementById('homeIncome').textContent = `¥${stats.income.toFixed(2)}`;
            document.getElementById('homeExpense').textContent = `¥${stats.expense.toFixed(2)}`;
            document.getElementById('statsIncome').textContent = `¥${stats.income.toFixed(2)}`;
            document.getElementById('statsExpense').textContent = `¥${stats.expense.toFixed(2)}`;
            
            const balance = stats.income - stats.expense;
            document.getElementById('homeBalance').textContent = `${balance >= 0 ? '' : '-'}¥${Math.abs(balance).toFixed(2)}`;
        }
        
        async function renderTrendChart() {
            const dailyStats = await getDailyStats();
            const chart = document.getElementById('trendChart');
            
            const last7Days = [];
            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                last7Days.push(date.toISOString().split('T')[0]);
            }
            
            const data = last7Days.map(dateStr => {
                const stat = dailyStats.find(d => d.date === dateStr);
                return stat ? stat.amount : 0;
            });
            
            const maxAmount = Math.max(...data, 1);
            
            chart.innerHTML = data.map((amount, index) => {
                const height = (amount / maxAmount) * 100;
                const date = new Date(last7Days[index]);
                const day = date.getDate();
                return `
                    <div class="trend-bar-container">
                        <div class="trend-bar-wrapper">
                            <div class="trend-bar" style="height: ${Math.max(height, 2)}%;"></div>
                        </div>
                        <div class="trend-bar-label">${day}</div>
                    </div>
                `;
            }).join('');
        }
        
        async function renderPieChart() {
            const categoryStats = await getCategoryStats();
            const legend = document.getElementById('statsLegend');
            const mainPie = document.getElementById('mainPie');
            
            const total = categoryStats.reduce((sum, item) => sum + item.amount, 0);
            
            if (total === 0) {
                legend.innerHTML = '<div style="color: var(--text-secondary); font-size: 13px;">暂无支出数据</div>';
                mainPie.style.background = '#e5e7eb';
                mainPie.innerHTML = '<div class="pie-center"><div class="pie-center-value">¥0</div><div class="pie-center-label">总支出</div></div>';
                return;
            }
            
            let pieGradient = '';
            let currentAngle = 0;
            
            const sortedStats = [...categoryStats].sort((a, b) => b.amount - a.amount);
            
            sortedStats.forEach((item, index) => {
                const percentage = (item.amount / total) * 100;
                const degrees = (percentage / 100) * 360;
                const cat = categories[item.category] || categories['其他'];
                
                if (index === 0) {
                    pieGradient += `${cat.color} 0deg, ${cat.color} ${degrees}deg`;
                } else {
                    pieGradient += `, ${cat.color} ${currentAngle}deg, ${cat.color} ${currentAngle + degrees}deg`;
                }
                currentAngle += degrees;
            });
            
            mainPie.style.background = `conic-gradient(${pieGradient})`;
            mainPie.innerHTML = `<div class="pie-center"><div class="pie-center-value">¥${total.toFixed(0)}</div><div class="pie-center-label">总支出</div></div>`;
            
            legend.innerHTML = sortedStats.slice(0, 5).map(item => {
                const cat = categories[item.category] || categories['其他'];
                return `
                    <div class="pie-legend-item">
                        <span class="pie-legend-color" style="background: ${cat.color};"></span>
                        <span class="pie-legend-name">${item.category}</span>
                        <span class="pie-legend-value">¥${item.amount.toFixed(0)}</span>
                    </div>
                `;
            }).join('');
        }
        
        async function renderAccountList() {
            const balances = await getAccountBalances();
            const list = document.getElementById('accountList');
            
            document.getElementById('totalBalance').textContent = `¥${balances.totalBalance.toFixed(2)}`;
            
            if (balances.accounts.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">💳</div><div class="empty-text">暂无账户</div><div class="empty-hint">点击下方按钮添加账户</div></div>';
                return;
            }
            
            list.innerHTML = balances.accounts.map(acc => `
                <div class="account-card">
                    <div class="account-header">
                        <div class="account-left">
                            <div class="account-icon">${acc.icon}</div>
                            <div class="account-name">${acc.name}</div>
                        </div>
                        <div class="account-balance">¥${acc.balance.toFixed(2)}</div>
                    </div>
                    <div class="account-footer">
                        <span>可用余额</span>
                        <span style="color: var(--text-tertiary);">查看详情</span>
                    </div>
                </div>
            `).join('');
        }
        
        function groupByDate(expenses) {
            const groups = {};
            expenses.forEach(item => {
                if (!groups[item.date]) {
                    groups[item.date] = [];
                }
                groups[item.date].push(item);
            });
            return groups;
        }
        
        function renderListItem(item) {
            const cat = categories[item.category] || categories['其他'];
            const noteHtml = item.note ? `<span>${item.note}</span>` : '';
            
            let amountClass = 'expense';
            let amountPrefix = '-';
            if (item.type === 'income') {
                amountClass = 'income';
                amountPrefix = '+';
            } else if (item.type === 'transfer') {
                amountClass = 'transfer';
                amountPrefix = '';
            }
            
            const fromAccount = accounts.find(a => a.id === item.account);
            const toAccount = accounts.find(a => a.id === item.to_account);
            
            let accountHtml = '';
            if (item.type === 'transfer' && fromAccount && toAccount) {
                accountHtml = `<span>${fromAccount.name} → ${toAccount.name}</span>`;
            } else if (fromAccount) {
                accountHtml = `<span>${fromAccount.icon} ${fromAccount.name}</span>`;
            }
            
            return `
                <div class="record-item" data-id="${item.id}">
                    <div class="record-left">
                        <div class="record-icon" style="background: ${cat.bg}; color: ${cat.color};">${cat.icon}</div>
                        <div class="record-info">
                            <div class="record-category">${item.category}</div>
                            <div class="record-detail">
                                ${noteHtml}
                                ${accountHtml}
                            </div>
                        </div>
                    </div>
                    <div class="record-right">
                        <div class="record-amount ${amountClass}">${amountPrefix}¥${parseFloat(item.amount).toFixed(2)}</div>
                        <button class="record-delete" onclick="deleteExpense('${item.id}')">×</button>
                    </div>
                </div>
            `;
        }
        
        async function renderHomeList() {
            const expenses = await getAllExpenses();
            expenses.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            const list = document.getElementById('homeList');
            
            if (expenses.length === 0) {
                list.innerHTML = '<div class="empty-state" style="padding: 40px 20px;"><div class="empty-icon">📝</div><div class="empty-text">暂无记账记录</div><div class="empty-hint">点击下方 + 按钮开始记账</div></div>';
                return;
            }
            
            const groups = groupByDate(expenses);
            const dates = Object.keys(groups).sort((a, b) => new Date(b) - new Date(a));
            
            list.innerHTML = dates.map(date => `
                <div>
                    <div class="date-group">
                        <span>${formatDateGroup(date)}</span>
                        <div class="date-divider"></div>
                    </div>
                    ${groups[date].map(item => renderListItem(item)).join('')}
                </div>
            `).join('');
        }
        
        async function refreshData() {
            await calculateStats();
            await renderTrendChart();
            await renderPieChart();
            await renderAccountList();
            
            if (currentView === 'home') await renderHomeList();
        }
        
        async function addRecord() {
            const amount = document.getElementById('amount').value;
            const category = selectedCategory || document.getElementById('category')?.value;
            const account = document.getElementById('account').value;
            const toAccount = document.getElementById('toAccount').value;
            const date = document.getElementById('date').value;
            const note = document.getElementById('note').value;
            
            if (!amount || parseFloat(amount) <= 0) {
                alert('请输入有效的金额');
                return;
            }
            if (!category) {
                alert('请选择分类');
                return;
            }
            if (!date) {
                alert('请选择日期');
                return;
            }
            if (!account) {
                alert('请选择账户');
                return;
            }
            if (currentTab === 'transfer' && !toAccount) {
                alert('请选择转入账户');
                return;
            }
            if (currentTab === 'transfer' && account === toAccount) {
                alert('转入账户不能与转出账户相同');
                return;
            }
            
            try {
                await fetch('/api/expenses', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: currentTab, amount, category, account, to_account: toAccount, date, note })
                });
                
                document.getElementById('amount').value = '';
                document.getElementById('date').value = '';
                document.getElementById('note').value = '';
                selectedCategory = '';
                
                closeBottomSheet();
                refreshData();
            } catch (error) {
                alert('保存失败，请重试');
            }
        }
        
        async function deleteExpense(id) {
            if (!confirm('确定要删除这条记录吗？')) return;
            try {
                await fetch(`/api/expenses/${id}`, { method: 'DELETE' });
                refreshData();
            } catch (error) {
                alert('删除失败，请重试');
            }
        }
        
        const emojiOptions = ['moneybag', 'credit_card', 'banknote', 'bank', 'mobile', 'package', 'gem', 'gift', 'backpack', 'speech', 'plane', 'rocket', 'home', 'car', 'gamepad', 'theater'];
        let selectedEmoji = '💰';
        
        function renderEmojiSelector() {
            const emojis = ['💰', '💳', '💵', '🏦', '', '📦', '💎', '🎁', '🎒', '💬', '✈️', '🚀', '🏠', '🚗', '🎮', '🎭'];
            document.getElementById('emojiSelector').innerHTML = emojis.map(emoji => `
                <button class="emoji-option ${selectedEmoji === emoji ? 'selected' : ''}" onclick="selectEmoji('${emoji}')">${emoji}</button>
            `).join('');
        }
        
        function selectEmoji(emoji) {
            selectedEmoji = emoji;
            renderEmojiSelector();
        }
        
        function openAddAccountModal() {
            selectedEmoji = '💰';
            document.getElementById('newAccountName').value = '';
            renderEmojiSelector();
            document.getElementById('addAccountModal').classList.add('show');
        }
        
        function closeAddAccountModal() {
            document.getElementById('addAccountModal').classList.remove('show');
        }
        
        async function confirmAddAccount() {
            const name = document.getElementById('newAccountName').value.trim();
            if (!name) {
                alert('请输入账户名称');
                return;
            }
            if (accounts.some(acc => acc.name === name)) {
                alert('该账户名称已存在');
                return;
            }
            
            try {
                await fetch('/api/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, icon: selectedEmoji })
                });
                
                closeAddAccountModal();
                await loadAccounts();
                refreshData();
            } catch (error) {
                alert('添加失败，请重试');
            }
        }
        
        document.getElementById('addAccountModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('addAccountModal')) {
                closeAddAccountModal();
            }
        });
        
        document.addEventListener('DOMContentLoaded', async () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
            
            updateMonthDisplay();
            await loadAccounts();
            refreshData();
        });
