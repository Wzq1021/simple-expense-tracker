<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简记账</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f7fa;
            min-height: 100vh;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        header h1 {
            font-size: 28px;
            color: #1a1a2e;
            font-weight: 600;
        }
        
        .month-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .month-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: white;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: all 0.2s;
        }
        
        .month-btn:hover {
            background: #f0f0ff;
            transform: scale(1.05);
        }
        
        .month-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        
        .current-month {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a2e;
            min-width: 120px;
            text-align: center;
        }
        
        .today-link {
            font-size: 14px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            margin-top: 8px;
            display: inline-block;
        }
        
        .today-link:hover {
            text-decoration: underline;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 20px;
            color: white;
        }
        
        .stat-card:last-child {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }
        
        .form-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group:last-child {
            margin-bottom: 0;
        }
        
        label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input[type="number"],
        select,
        input[type="date"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s;
            outline: none;
        }
        
        input[type="number"]:focus,
        select:focus,
        input[type="date"]:focus {
            border-color: #667eea;
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        .list-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }
        
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .list-header h2 {
            font-size: 18px;
            color: #1a1a2e;
        }
        
        .list-count {
            font-size: 14px;
            color: #999;
        }
        
        .expense-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .expense-item:last-child {
            border-bottom: none;
        }
        
        .expense-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .category-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .category-food { background: #fff0f0; }
        .category-transport { background: #f0f8ff; }
        .category-shopping { background: #fff8f0; }
        .category-entertainment { background: #f0fff0; }
        .category-other { background: #fafafa; }
        
        .expense-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .expense-category {
            font-size: 16px;
            font-weight: 500;
            color: #1a1a2e;
        }
        
        .expense-date {
            font-size: 13px;
            color: #999;
        }
        
        .expense-note {
            font-size: 13px;
            color: #666;
            font-style: italic;
            margin-top: 2px;
        }
        
        .expense-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .expense-amount {
            font-size: 18px;
            font-weight: 600;
            color: #e74c3c;
        }
        
        .delete-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            transition: all 0.2s;
        }
        
        .delete-btn:hover {
            background: #ffebee;
            color: #e74c3c;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-state p {
            font-size: 15px;
            margin-top: 8px;
        }
        
        .category-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
        
        .date-filter {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .date-filter input {
            flex: 1;
            padding: 10px;
        }
        
        .date-filter button {
            padding: 10px 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>极简记账</h1>
        </header>
        
        <div class="month-selector">
            <button class="month-btn" onclick="prevMonth()">‹</button>
            <div class="current-month" id="currentMonth">2026年7月</div>
            <button class="month-btn" onclick="nextMonth()">›</button>
        </div>
        <div style="text-align: center;">
            <a href="#" class="today-link" onclick="goToToday()">返回今天</a>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">本月支出</div>
                <div class="stat-value" id="monthTotal">¥0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">记录笔数</div>
                <div class="stat-value" id="recordCount">0</div>
            </div>
        </div>
        
        <div class="form-section">
            <div class="form-group">
                <label for="amount">金额</label>
                <input type="number" id="amount" placeholder="0.00" step="0.01" min="0">
            </div>
            
            <div class="form-group">
                <label for="category">分类</label>
                <select id="category" class="category-select">
                    <option value="餐饮">餐饮</option>
                    <option value="交通">交通</option>
                    <option value="购物">购物</option>
                    <option value="娱乐">娱乐</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="date">日期</label>
                <input type="date" id="date">
            </div>
            
            <div class="form-group">
                <label for="note">备注（可选）</label>
                <input type="text" id="note" placeholder="例如：老乡鸡、滴滴打车...">
            </div>
            
            <button onclick="addExpense()">保存</button>
        </div>
        
        <div class="list-section">
            <div class="list-header">
                <h2>支出记录</h2>
                <span class="list-count" id="listCount">0 笔</span>
            </div>
            <ul class="expense-list" id="expenseList"></ul>
        </div>
    </div>
    
    <script>
        const categories = {
            '餐饮': { icon: '🍜', class: 'category-food' },
            '交通': { icon: '🚗', class: 'category-transport' },
            '购物': { icon: '🛍️', class: 'category-shopping' },
            '娱乐': { icon: '🎮', class: 'category-entertainment' },
            '其他': { icon: '📝', class: 'category-other' }
        };
        
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return `${month}月${day}日 ${weekDays[date.getDay()]}`;
        }
        
        function getMonthRange(year, month) {
            const startDate = `${year}-${String(month + 1).padStart(2, '0')}-01`;
            const endDate = new Date(year, month + 1, 0);
            const endDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(endDate.getDate()).padStart(2, '0')}`;
            return { startDate, endDateStr };
        }
        
        function updateMonthDisplay() {
            document.getElementById('currentMonth').textContent = `${currentYear}年${currentMonth + 1}月`;
        }
        
        function prevMonth() {
            if (currentMonth === 0) {
                currentMonth = 11;
                currentYear--;
            } else {
                currentMonth--;
            }
            updateMonthDisplay();
            refreshData();
        }
        
        function nextMonth() {
            const today = new Date();
            if (currentYear === today.getFullYear() && currentMonth === today.getMonth()) {
                return;
            }
            if (currentMonth === 11) {
                currentMonth = 0;
                currentYear++;
            } else {
                currentMonth++;
            }
            updateMonthDisplay();
            refreshData();
        }
        
        function goToToday() {
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            updateMonthDisplay();
            refreshData();
        }
        
        async function getExpenses() {
            const { startDate, endDateStr } = getMonthRange(currentYear, currentMonth);
            try {
                const response = await fetch(`/api/expenses?start=${startDate}&end=${endDateStr}`);
                return await response.json();
            } catch (error) {
                console.error('获取数据失败:', error);
                return [];
            }
        }
        
        async function calculateStats() {
            const expenses = await getExpenses();
            let monthTotal = 0;
            
            expenses.forEach(item => {
                monthTotal += parseFloat(item.amount);
            });
            
            document.getElementById('monthTotal').textContent = `¥${monthTotal.toFixed(2)}`;
            document.getElementById('recordCount').textContent = expenses.length;
            document.getElementById('listCount').textContent = `${expenses.length} 笔`;
        }
        
        async function renderList() {
            const expenses = await getExpenses();
            const list = document.getElementById('expenseList');
            
            if (expenses.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 16px;">📝</div>
                        <p>${currentYear}年${currentMonth + 1}月没有支出记录</p>
                    </div>
                `;
                return;
            }
            
            expenses.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            list.innerHTML = expenses.map(item => {
                const cat = categories[item.category] || categories['其他'];
                const noteHtml = item.note ? `<div class="expense-note">${item.note}</div>` : '';
                return `
                    <li class="expense-item" data-id="${item.id}">
                        <div class="expense-left">
                            <div class="category-icon ${cat.class}">${cat.icon}</div>
                            <div class="expense-info">
                                <div class="expense-category">${item.category}</div>
                                ${noteHtml}
                                <div class="expense-date">${formatDate(item.date)}</div>
                            </div>
                        </div>
                        <div class="expense-right">
                            <div class="expense-amount">-¥${parseFloat(item.amount).toFixed(2)}</div>
                            <button class="delete-btn" onclick="deleteExpense('${item.id}')">×</button>
                        </div>
                    </li>
                `;
            }).join('');
        }
        
        async function refreshData() {
            await calculateStats();
            await renderList();
        }
        
        async function addExpense() {
            const amount = document.getElementById('amount').value;
            const category = document.getElementById('category').value;
            const date = document.getElementById('date').value;
            const note = document.getElementById('note').value;
            
            if (!amount || parseFloat(amount) <= 0) {
                alert('请输入有效的金额');
                return;
            }
            
            if (!date) {
                alert('请选择日期');
                return;
            }
            
            try {
                await fetch('/api/expenses', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ amount, category, date, note })
                });
                
                document.getElementById('amount').value = '';
                document.getElementById('date').value = '';
                document.getElementById('note').value = '';
                
                const expenseDate = new Date(date);
                if (expenseDate.getFullYear() === currentYear && expenseDate.getMonth() === currentMonth) {
                    await refreshData();
                } else {
                    goToToday();
                }
            } catch (error) {
                alert('保存失败，请重试');
                console.error('保存失败:', error);
            }
        }
        
        async function deleteExpense(id) {
            if (!confirm('确定要删除这条记录吗？')) {
                return;
            }
            
            try {
                await fetch(`/api/expenses/${id}`, {
                    method: 'DELETE'
                });
                
                await refreshData();
            } catch (error) {
                alert('删除失败，请重试');
                console.error('删除失败:', error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
            
            updateMonthDisplay();
            await refreshData();
        });
    </script>
</body>
</html>
